<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Text Formatter</title>
    <style>
        #editor {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 50px;
            margin-top: 10px;
            width: 300px;
        }
    </style>
</head>
<body>

    <div id="editor" contenteditable="true"></div><br>
    <select name="drop" id="dropdown">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
        <option value="21">21</option>
        <option value="22">22</option>
        <option value="23">23</option>
        <option value="24">24</option>
        <option value="25">25</option>
        <option value="26">26</option>
        <option value="27">27</option>
        <option value="28">28</option>
        <option value="29">29</option>
        <option value="30">30</option>
        <option value="31">31</option>
        <option value="32">32</option>
        <option value="33">33</option>
        <option value="34">34</option>
        <option value="35">35</option>
        <option value="36">36</option>
        <option value="37">37</option>
        <option value="38">38</option>
        <option value="39">39</option>
        <option value="40">40</option>

    </select>
    <input type="checkbox" id="boldCheckbox" onclick="toggleBold()"> Bold
    <input type="checkbox" id="italicCheckbox" onclick="toggleItalic()"> Italic
    <input type="checkbox" id="underlineCheckbox" onclick="toggleUnderline()"> Underline

    
</body>
<script>
let bold=document.querySelector("#boldCheckbox");
    let italic=document.querySelector("#italicCheckbox");
    let underline=document.querySelector("#underlineCheckbox");
    let text=document.querySelector("#editor")
   
   bold.addEventListener("input",(e)=>{
        if(e.target.checked){
            text.style.fontWeight="600";

        };
        
   })
   italic.addEventListener("input",(e)=>{
        if(e.target.checked){
            text.style.fontStyle="italic";
        };
    })
    underline.addEventListener("input",(e)=>{
        if(e.target.checked){
            text.style.textDecoration="underline";
        };

    })
    document.querySelector("#dropdown").addEventListener("change",()=>{
    let size = document.querySelector("#dropdown").value;
    text.style.fontSize = size + "px"; 
    
    })




    
</script>
</html>
